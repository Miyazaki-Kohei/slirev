<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96">
  <title>Slirev</title>
  <desc>スライドレビューサービスのアイコン</desc>
  <!-- Navy rounded background -->
  <rect width="96" height="96" rx="20" fill="#1B4565"/>
  <!-- Back slide (depth) -->
  <rect x="18" y="18" width="46" height="32" rx="4" fill="#FFFFFF" opacity="0.25"/>
  <!-- Front slide -->
  <rect x="12" y="14" width="46" height="32" rx="4" fill="#FFFFFF"/>
  <!-- Slide content lines -->
  <rect x="18" y="22" width="26" height="3" rx="1.5" fill="#2A5F8F" opacity="0.55"/>
  <rect x="18" y="28" width="20" height="2" rx="1" fill="#2A5F8F" opacity="0.25"/>
  <rect x="18" y="33" width="22" height="2" rx="1" fill="#2A5F8F" opacity="0.25"/>
  <rect x="18" y="38" width="16" height="2" rx="1" fill="#2A5F8F" opacity="0.25"/>
  <!-- Comment bubble (teal) -->
  <rect x="42" y="44" width="42" height="28" rx="8" fill="#3E9BA4"/>
  <path d="M52 72 L48 80 L58 72 Z" fill="#3E9BA4"/>
  <!-- Checkmark -->
  <polyline points="52,56 60,64 74,50" fill="none" stroke="#FFFFFF" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
